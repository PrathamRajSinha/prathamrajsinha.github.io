<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="contact.css">
  <title>Contact Me</title>
</head>
<body>
  <div class="mesh-background"></div>
  <div class="contact-container">
    <header>
      <h1>Contact Me</h1>
      <button><a href="../index.html">Home</a></button>
    </header>
    <main>
      <section class="contact-info">
        <h2>Get in Touch</h2>
        <p>Feel free to reach out to me through the following methods:</p>
        <ul>
          <li>LinkedIn: <a href="https://www.linkedin.com/in/pratham-raj-sinha/" target="_blank">https://www.linkedin.com/in/pratham-raj-sinha/</a></li>
          <li>Phone: +91 9148253924</li>
          <li>Email: <a href="mailto:prathamrajsinha@gmail.com">prathamrajsinha@gmail.com</a></li>
        </ul>
      </section>
      <section class="contact-form">
        <h2>Contact Form</h2>
        <form>
          <label for="email">Your Email:</label>
          <input type="email" id="email" name="email" required>
          <label for="message">What would you like to talk about?</label>
          <textarea id="message" name="message" rows="4" required></textarea>
          <button type="submit">Submit</button>
        </form>
      </section>
    </main>
  </div>
</body>
</html>
